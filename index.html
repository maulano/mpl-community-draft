<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mango Cup Ramadhan Season 2</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    overflow: hidden;
}

/* ===== HEADER ===== */
.broadcast-header {
    background: #0b1220;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1f2937;
}

.event-title {
    font-weight: bold;
    letter-spacing: 2px;
}

.match-info input {
    background: #1f2937;
    border: none;
    color: white;
    text-align: center;
    border-radius: 4px;
    width: 60px;
}

/* ===== SCOREBOARD ===== */
.scoreboard {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 25px;
    padding: 10px;
    font-size: 18px;
    background: #111827;
}

.team-name {
    font-weight: bold;
}

.score {
    font-size: 22px;
    font-weight: bold;
}

.score button {
    padding: 5px 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

/* ===== MAIN ===== */
.main {
    display: flex;
    height: 75vh;
    justify-content: space-around;
    align-items: center;
}

.team {
    width: 28%;
    background: #111827;
    border-radius: 14px;
    padding: 15px;
    min-height: 420px;
    transition: 0.3s;
}

.team.activeA { box-shadow: 0 0 20px #ef4444; }
.team.activeB { box-shadow: 0 0 20px #3b82f6; }

.team h2 {
    text-align: center;
    margin-bottom: 10px;
}

.teamA h2 { color: #ef4444; }
.teamB h2 { color: #3b82f6; }

.player {
    background: #1f2937;
    padding: 8px;
    margin: 6px 0;
    border-radius: 8px;
    text-align: center;
}

.captain {
    border: 1px solid gold;
    color: gold;
}

.pool {
    width: 30%;
    text-align: center;
}

.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
}

.card {
    width: 90px;
    height: 130px;
    perspective: 1000px;
    cursor: pointer;
}

.card-inner {
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(.17,.67,.83,.67);
    transform-style: preserve-3d;
    position: relative;
}

.card.flip .card-inner {
    transform: rotateY(180deg);
}

.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 10px;
    backface-visibility: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
}

.card-front {
    background: #1f2937;
    font-size: 24px;
}

.card-back {
    background: #2563eb;
    transform: rotateY(180deg);
}

.turn {
    text-align: center;
    font-size: 18px;
    margin-top: 10px;
    letter-spacing: 2px;
}

.timer {
    font-size: 28px;
    margin-top: 5px;
}

button {
    padding: 8px 14px;
    margin: 8px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: #2563eb;
    color: white;
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div class="broadcast-header">
    <div class="event-title">
        MANGO CUP RAMADHAN SEASON 2
    </div>
    <div class="match-info">
        MATCH 
        <input type="number" value="13">
        — BO3 — GAME 
        <input type="number" value="1">
    </div>
</div>

<!-- ===== SCOREBOARD ===== -->
<div class="scoreboard">
    <div class="team-name" style="color:#ef4444;">MANGO A</div>

    <div class="score">
        <button onclick="addScore('A')">+</button>
        <span id="scoreA">0</span>
    </div>

    -

    <div class="score">
        <span id="scoreB">0</span>
        <button onclick="addScore('B')">+</button>
    </div>

    <div class="team-name" style="color:#3b82f6;">MANGO B</div>
</div>

<div id="draftSection">
    <div class="turn" id="turnInfo"></div>
    <div class="timer" id="timer"></div>

    <div class="main">

        <div class="team teamA" id="teamABox">
            <h2>MANGO A</h2>
            <div id="teamA"></div>
        </div>

        <div class="pool">
            <h2>BLIND POOL</h2>
            <div class="cards" id="cardContainer"></div>
        </div>

        <div class="team teamB" id="teamBBox">
            <h2>MANGO B</h2>
            <div id="teamB"></div>
        </div>

    </div>

    <div style="text-align:center;">
        <button onclick="resetDraft()">RESET DRAFT</button>
    </div>
</div>

<script>
let scoreA = 0;
let scoreB = 0;

function addScore(team){
    if(team === 'A'){
        scoreA++;
        document.getElementById("scoreA").innerText = scoreA;
    } else {
        scoreB++;
        document.getElementById("scoreB").innerText = scoreB;
    }
}

/* ===== DRAFT ENGINE ===== */

let players = ["P1","P2","P3","P4","P5","P6","P7","P8","P9","P10"];
let captains = [];
let pool = [];
let teamA = [];
let teamB = [];
let pickOrder = ["A","B","B","A","A","B","B","A"];
let pickIndex = 0;
let timerInterval;
let timeLeft = 15;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function startDraftAuto() {
    shuffle(players);
    captains = [players[0], players[1]];
    teamA = [captains[0]];
    teamB = [captains[1]];
    pool = players.slice(2);
    render();
    startTimer();
}

function render() {
    document.getElementById("teamA").innerHTML =
        teamA.map(p => `<div class="player ${captains.includes(p)?'captain':''}">${p}</div>`).join("");

    document.getElementById("teamB").innerHTML =
        teamB.map(p => `<div class="player ${captains.includes(p)?'captain':''}">${p}</div>`).join("");

    document.getElementById("teamABox").classList.remove("activeA");
    document.getElementById("teamBBox").classList.remove("activeB");

    if (pickIndex < pickOrder.length) {
        let turn = pickOrder[pickIndex];
        document.getElementById("turnInfo").innerText = "TURN: TEAM " + turn;
        if (turn === "A") document.getElementById("teamABox").classList.add("activeA");
        else document.getElementById("teamBBox").classList.add("activeB");
    } else {
        document.getElementById("turnInfo").innerText = "DRAFT COMPLETE";
        clearInterval(timerInterval);
        return;
    }

    const container = document.getElementById("cardContainer");
    container.innerHTML = "";

    pool.forEach(player => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="card-inner">
                <div class="card-front">?</div>
                <div class="card-back">${player}</div>
            </div>
        `;
        card.onclick = () => flipCard(card, player);
        container.appendChild(card);
    });
}

function flipCard(card, player) {
    if (pickIndex >= pickOrder.length) return;
    card.classList.add("flip");

    setTimeout(() => {
        if (pickOrder[pickIndex] === "A") teamA.push(player);
        else teamB.push(player);
        pool = pool.filter(p => p !== player);
        pickIndex++;
        render();
    }, 600);
}

function startTimer() {
    timeLeft = 15;
    document.getElementById("timer").innerText = timeLeft;
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;
        if (timeLeft <= 0) autoPick();
    }, 1000);
}

function autoPick() {
    clearInterval(timerInterval);
    if (pool.length > 0) {
        let randomPlayer = pool[Math.floor(Math.random()*pool.length)];
        if (pickOrder[pickIndex] === "A") teamA.push(randomPlayer);
        else teamB.push(randomPlayer);
        pool = pool.filter(p => p !== randomPlayer);
        pickIndex++;
        render();
        startTimer();
    }
}

function resetDraft() {
    location.reload();
}

startDraftAuto();
</script>

</body>
</html>
