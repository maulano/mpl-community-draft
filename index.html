<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mango Cup Ramadhan Season 2</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#0f172a,#020617);
color:white;
overflow:hidden;
}

/* ================= INTRO ================= */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
opacity:0;
animation:introFade 1.5s forwards;
}

@keyframes introFade{
to{opacity:1;}
}

#intro button{
margin-top:25px;
padding:12px 30px;
background:#2563eb;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

/* ================= APP HIDDEN ================= */
#app{
display:none;
}

/* ================= HEADER ================= */
.broadcast-header{
background:#0b1220;
padding:20px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #1f2937;
font-size:22px;
font-weight:600;
}

.match-info input{
background:#1f2937;
border:none;
color:white;
width:70px;
text-align:center;
border-radius:4px;
font-size:16px;
}

/* ================= SCOREBOARD ================= */
.scoreboard{
display:flex;
justify-content:center;
gap:40px;
padding:15px;
background:#111827;
font-size:20px;
font-weight:600;
}

.score button{
background:#2563eb;
border:none;
color:white;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}

/* ================= MAIN ================= */
.main{
display:flex;
height:60vh;
justify-content:space-around;
align-items:center;
}

.team{
width:30%;
background:#111827;
border-radius:14px;
padding:15px;
min-height:420px;
}

.teamA h2{color:#ef4444;}
.teamB h2{color:#3b82f6;}

.player{
display:flex;
align-items:center;
gap:8px;
background:#1f2937;
padding:6px;
margin:6px 0;
border-radius:8px;
font-size:14px;
}

.player img{
width:35px;
height:35px;
border-radius:6px;
object-fit:cover;
}

.captain{
border:2px solid gold;
}

/* ================= CARD ================= */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

.card{
width:100px;
height:150px;
perspective:1000px;
cursor:pointer;
position:relative;
}

.card-inner{
width:100%;
height:100%;
transition:transform .6s;
transform-style:preserve-3d;
position:relative;
}

.card.flip .card-inner{
transform:rotateY(180deg);
}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:10px;
backface-visibility:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.card-front{
background:#1f2937;
font-size:26px;
}

.card-back{
background:#e5e7eb;
transform:rotateY(180deg);
flex-direction:column;
color:black;
}

.card-back img{
width:100%;
height:85%;
object-fit:cover;
border-radius:10px 10px 0 0;
}

/* ================= SLIDE ANIMATION ================= */
.slideLeft{
animation:slideLeft .9s forwards;
}
.slideRight{
animation:slideRight .9s forwards;
}

@keyframes slideLeft{
to{transform:translateX(-520px) scale(.5);}
}
@keyframes slideRight{
to{transform:translateX(520px) scale(.5);}
}

/* ================= CAPTAIN REVEAL ================= */
.revealOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:flex;
justify-content:center;
align-items:center;
z-index:99998;
}

.revealCard{
background:white;
color:black;
padding:20px;
border-radius:14px;
text-align:center;
animation:zoomIn .6s forwards;
}

@keyframes zoomIn{
from{transform:scale(.6);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.revealCard img{
width:200px;
border-radius:12px;
margin:15px 0;
}

.timer{
text-align:center;
font-size:28px;
margin-top:10px;
}

#draftComplete{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:42px;
z-index:99999;
}
</style>
</head>

<body>

<div id="intro">
<h1 style="font-size:46px;">MANGO CUP</h1>
<h2 style="font-size:30px;">RAMADHAN SEASON 2</h2>
<button onclick="startFlow()">START DRAFT</button>
</div>

<div id="app">

<div class="broadcast-header">
<div>MANGO CUP RAMADHAN SEASON 2</div>
<div class="match-info">
MATCH <input type="number" value="00">
— BO3 — GAME <input type="number" value="00">
</div>
</div>

<div class="scoreboard">
<div style="color:#ef4444;">MANGO A</div>
<div class="score">
<button onclick="updateScore('A')">+</button>
<span id="scoreA">0</span>
</div>
-
<div class="score">
<span id="scoreB">0</span>
<button onclick="updateScore('B')">+</button>
</div>
<div style="color:#3b82f6;">MANGO B</div>
</div>

<div class="timer" id="timer"></div>

<div class="main">
<div class="team teamA"><h2>MANGO A</h2><div id="teamA"></div></div>
<div><div class="cards" id="cardContainer"></div></div>
<div class="team teamB"><h2>MANGO B</h2><div id="teamB"></div></div>
</div>

</div>



<script>
let players=["Ilham","Ifdal","Avi","Abdu","Rafsul","Rehan","Adit","Farug","Torig","Ricat"];
let captains=[];
let pool=[];
let teamA=[], teamB=[];
let pickIndex=0;
let currentTurn="A";
let timerInterval;
let timeLeft=45;
let scoreA=0, scoreB=0;

function updateScore(team){
if(team==="A"){scoreA++;document.getElementById("scoreA").innerText=scoreA;}
else{scoreB++;document.getElementById("scoreB").innerText=scoreB;}
}

function shuffle(a){
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

function startFlow(){
document.getElementById("intro").style.display="none";
document.getElementById("app").style.display="block";

shuffle(players);
captains=[players[0],players[1]];

showCaptainReveal("MANGO A CAPTAIN",captains[0],()=>{
teamA=[captains[0]];
showCaptainReveal("MANGO B CAPTAIN",captains[1],()=>{
teamB=[captains[1]];
startDraft();
});
});
}

function showCaptainReveal(title,name,callback){
const overlay=document.createElement("div");
overlay.className="revealOverlay";
overlay.innerHTML=`
<div class="revealCard">
<h2>${title}</h2>
<img src="${name.toLowerCase()}.jpg">
<h3>${name}</h3>
</div>`;
document.body.appendChild(overlay);

setTimeout(()=>{
overlay.remove();
callback();
},3000);
}

function startDraft(){
pool=players.slice(2);
render();
startTimer();
}

function render(){
document.getElementById("teamA").innerHTML=
teamA.map(p=>`
<div class="player">
<img src="${p.toLowerCase()}.jpg"> | ${p}
</div>`).join("");

document.getElementById("teamB").innerHTML=
teamB.map(p=>`
<div class="player">
<img src="${p.toLowerCase()}.jpg"> | ${p}
</div>`).join("");

const container=document.getElementById("cardContainer");
container.innerHTML="";
pool.forEach((player,i)=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<div class="card-inner">
<div class="card-front">${i+1}</div>
<div class="card-back">
<img src="${player.toLowerCase()}.jpg">
<div style="font-size:12px">${player}</div>
</div>
</div>`;
card.onclick=()=>handleCard(card,player);
container.appendChild(card);
});
}

function handleCard(card,player){
if(!card.classList.contains("flip")){
card.classList.add("flip");
}else{
if(currentTurn==="A"){
card.classList.add("slideLeft");
}else{
card.classList.add("slideRight");
}

setTimeout(()=>{
if(currentTurn==="A"){
teamA.push(player);
currentTurn="B";
}else{
teamB.push(player);
currentTurn="A";
}
pool=pool.filter(p=>p!==player);
pickIndex++;
if(pickIndex>=8){
render(); // PENTING — update UI dulu
clearInterval(timerInterval);
document.getElementById("timer").innerText="00";
showResetButton();
}else{
render();
startTimer();
}
},900);
}
}

function startTimer(){
clearInterval(timerInterval);
timeLeft=45;
document.getElementById("timer").innerText=timeLeft;
timerInterval=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText=timeLeft;
if(timeLeft<=0){
clearInterval(timerInterval);
}
},1000);
}
  function showResetButton(){
const btn=document.createElement("button");
btn.innerText="RESET DRAFT";
btn.style.marginTop="25px";
btn.style.padding="12px 24px";
btn.style.borderRadius="8px";
btn.style.border="none";
btn.style.background="#2563eb";
btn.style.color="white";
btn.style.cursor="pointer";
btn.style.display="block";
btn.style.marginLeft="auto";
btn.style.marginRight="auto";

btn.onclick=()=>location.reload();

document.querySelector(".main").after(btn);
}
</script>

</body>
</html>
