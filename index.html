<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mango Cup Ramadhan Season 2</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#0f172a,#020617);
color:white;
overflow:hidden;
}

/* ===== HIDE MAIN UNTIL INTRO DONE ===== */
#app{
display:none;
}

/* ===== INTRO (NO LEAK FIXED TOTAL) ===== */
#intro{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
opacity:0;
animation:fadeIn 1.5s forwards;
}

@keyframes fadeIn{to{opacity:1}}
@keyframes fadeOut{to{opacity:0}}

#intro button{
margin-top:20px;
padding:12px 28px;
background:#2563eb;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

/* ===== HEADER (DIPERBESAR) ===== */
.broadcast-header{
background:#0b1220;
padding:18px 20px;
display:flex;
justify-content:space-between;
border-bottom:1px solid #1f2937;
font-size:20px;
font-weight:600;
}

.match-info input{
background:#1f2937;
border:none;
color:white;
width:70px;
text-align:center;
border-radius:4px;
font-size:16px;
}

/* ===== SCOREBOARD (DIPERBESAR) ===== */
.scoreboard{
display:flex;
justify-content:center;
gap:35px;
padding:15px;
background:#111827;
font-size:20px;
font-weight:600;
}

.score button{
background:#2563eb;
border:none;
color:white;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}

/* ===== MAIN ===== */
.main{
display:flex;
height:60vh;
justify-content:space-around;
align-items:center;
}

.team{
width:28%;
background:#111827;
border-radius:14px;
padding:15px;
min-height:420px;
position:relative;
}

.teamA h2{color:#ef4444}
.teamB h2{color:#3b82f6}

.player{
background:#1f2937;
padding:8px;
margin:6px 0;
border-radius:8px;
text-align:center;
}

.captain{
border:2px solid gold;
color:gold;
}

/* ===== CARDS ===== */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

.card{
width:100px;
height:150px;
perspective:1000px;
cursor:pointer;
transition:.4s;
position:relative;
}

.card.zoom{
transform:scale(1.6);
z-index:500;
}

.card-inner{
width:100%;
height:100%;
transition:transform .6s;
transform-style:preserve-3d;
position:relative;
}

.card.flip .card-inner{
transform:rotateY(180deg);
}

.card-front,.card-back{
position:absolute;
width:100%;
height:100%;
border-radius:10px;
backface-visibility:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.card-front{
background:#1f2937;
font-size:26px;
}

.card-back{
background:#e5e7eb; /* LIGHT GREY */
transform:rotateY(180deg);
flex-direction:column;
color:black;
}

.card-back img{
width:100%;
height:85%;
object-fit:cover;
border-radius:10px 10px 0 0;
}

/* ===== SLIDE ANIMATION ===== */
.slide-left{
animation:slideLeft .8s forwards;
}
.slide-right{
animation:slideRight .8s forwards;
}

@keyframes slideLeft{
to{transform:translateX(-500px) scale(.5);}
}
@keyframes slideRight{
to{transform:translateX(500px) scale(.5);}
}

/* ===== DRAFT COMPLETE ===== */
#draftComplete{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
font-size:40px;
font-weight:700;
}

/* ===== TIMER ===== */
.timer{
text-align:center;
font-size:28px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1 style="font-size:42px;">MANGO CUP</h1>
<h2 style="font-size:28px;">RAMADHAN SEASON 2</h2>
<button onclick="startCaptainSequence()">START DRAFT</button>
</div>

<div id="app">

<div class="broadcast-header">
<div>MANGO CUP RAMADHAN SEASON 2</div>
<div class="match-info">
MATCH <input type="number" value="13">
— BO3 — GAME <input type="number" value="1">
</div>
</div>

<div class="scoreboard">
<div style="color:#ef4444;">MANGO A</div>
<div class="score">
<button onclick="scoreA++;scoreAEl.innerText=scoreA">+</button>
<span id="scoreA">0</span>
</div>
-
<div class="score">
<span id="scoreB">0</span>
<button onclick="scoreB++;scoreBEl.innerText=scoreB">+</button>
</div>
<div style="color:#3b82f6;">MANGO B</div>
</div>

<div class="timer" id="timer"></div>

<div class="main">
<div class="team teamA"><h2>MANGO A</h2><div id="teamA"></div></div>
<div><div class="cards" id="cardContainer"></div></div>
<div class="team teamB"><h2>MANGO B</h2><div id="teamB"></div></div>
</div>

</div>

<div id="draftComplete">
<div>DRAFT COMPLETE</div>
<button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;">RESET</button>
</div>

<script>
let scoreA=0,scoreB=0;
let scoreAEl=document.getElementById("scoreA");
let scoreBEl=document.getElementById("scoreB");

let players=["Ilham","Ifdal","Avi","Abdu","Rafsul","Rehan","Adit","Farug","Torig","Ricat"];
let captains=[],pool=[],teamA=[],teamB=[];
let pickOrder=["A","B","B","A","A","B","B","A"];
let pickIndex=0;
let timeLeft=45,timerInterval;

/* ===== INTRO FIX ===== */
function startCaptainSequence(){
document.getElementById("intro").style.animation="fadeOut 1s forwards";
setTimeout(()=>{
document.getElementById("intro").style.display="none";
document.getElementById("app").style.display="block";
shuffle(players);
captains=[players[0],players[1]];
teamA=[captains[0]];
teamB=[captains[1]];
startDraft();
},1000);
}

function shuffle(a){
for(let i=a.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}}

function startDraft(){
pool=players.slice(2);
render();
startTimer();
}

function render(){
document.getElementById("teamA").innerHTML=
teamA.map(p=>`<div class="player captain">${p}</div>`).join("");
document.getElementById("teamB").innerHTML=
teamB.map(p=>`<div class="player captain">${p}</div>`).join("");

const container=document.getElementById("cardContainer");
container.innerHTML="";
pool.forEach((player,i)=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<div class="card-inner">
<div class="card-front">${i+1}</div>
<div class="card-back">
<img src="${player.toLowerCase()}.jpg">
<div style="font-size:12px">${player}</div>
</div>
</div>`;
card.onclick=()=>handleCard(card,player);
container.appendChild(card);
});
}

function handleCard(card,player){
if(!card.classList.contains("flip")){
card.classList.add("flip");
card.classList.add("zoom");
}else{
card.classList.remove("zoom");
let team=pickOrder[pickIndex];
if(team==="A") card.classList.add("slide-left");
else card.classList.add("slide-right");

setTimeout(()=>{
if(team==="A") teamA.push(player);
else teamB.push(player);
pool=pool.filter(p=>p!==player);
pickIndex++;
if(pickIndex>=pickOrder.length){
document.getElementById("draftComplete").style.display="flex";
clearInterval(timerInterval);
}else{
render();
startTimer();
}
},800);
}
}

function startTimer(){
clearInterval(timerInterval);
timeLeft=45;
document.getElementById("timer").innerText=timeLeft;
timerInterval=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText=timeLeft;
if(timeLeft<=0) clearInterval(timerInterval);
},1000);
}
</script>

</body>
</html>
